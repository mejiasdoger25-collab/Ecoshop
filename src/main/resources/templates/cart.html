<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
			xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<!--HEAD CON FRAGMENT, para evitar repetir los mismos enlaces en todos los templates-->
<head th:replace="~{fragments/head :: head}"></head>

<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-5">
        <h2 class="mb-4">Tu Carrito</h2>

        <div th:if="${products.isEmpty()}" class="text-center py-5">
            <h4>Tu carrito está vacío</h4>
            <a href="/products/list" class="btn btn-success mt-3">Ver productos</a>
        </div>

        <div th:if="${not products.isEmpty()}">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Producto</th>
                        <th>Precio Unitario</th>
                        <th>Cantidad</th>
                        <th>Subtotal</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="entry : ${products}">
                        <td>
                            <strong th:text="${entry.key.name}"></strong>
                        </td>
                        <td th:text="${entry.key.price} + ' €'"></td>
                        <td th:text="${entry.value}"></td>
                        <td th:text="${entry.key.price * entry.value} + ' €'"></td>
                        <td>
                            <a th:href="@{/cart/remove/{id}(id=${entry.key.id})}" 
                               class="btn btn-danger btn-sm">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="row">
                <div class="col-md-6">
                    <h4>Total: <strong th:text="${total} + ' €'"></strong></h4>
                </div>
                <div class="col-md-6 text-end">
                    <a href="/products/list" class="btn btn-secondary me-2">Seguir comprando</a>
                    <form th:action="@{/cart/checkout}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-success">Tramitar Pedido</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

	
	<div th:replace="~{fragments/user-modal :: userModal}"></div>

	<div th:replace="~{fragments/footer :: footer}"></div>


</body>
</html>
