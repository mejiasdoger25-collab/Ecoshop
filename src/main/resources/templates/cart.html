<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head}"></head>

<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-5">
        <h2 class="mb-4">Your cart</h2>

        <div th:if="${products.isEmpty()}" class="text-center py-5">
            <h4>Your cart is empty</h4>
            <a href="/products/list" class="btn btn-success mt-3">Back to products</a>
        </div>

        <div th:if="${not products.isEmpty()}">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Product</th>
                            <th class="text-center">Unit price</th>
                            <th class="text-center">Quantity</th>
                            <th class="text-center">Subtotal</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="entry : ${products}">
                            <td>
                                <strong th:text="${entry.key.name}"></strong>
                            </td>
                            <td class="text-center" th:text="${entry.key.price} + ' €'"></td>
                            
                            <!-- Cantidad del product -->
                            <td class="text-center">
                                <span class="badge bg-light text-dark fs-6 border px-3 py-2" 
                                      th:text="${#numbers.formatDecimal(entry.key.price, 1, 2)} + ' €'"></span>
                            </td>
                            
							<!-- cantidad del orderLine -->
                            <td class="text-center fw-bold" 
                                th:text="${#numbers.formatDecimal(entry.key.price * entry.value, 1, 2)} + ' €'"></td>
                            
								
                            <!-- Botones + y - -->
                            <td class="text-end">
                                <div class="btn-group btn-group-sm" role="group">
                                    <!-- Quitar una unidad -->
                                    <a th:href="@{/cart/removeOne/{id}(id=${entry.key.id})}" 
                                       class="btn btn-outline-secondary" title="Remove one unit">
                                        <i class="bi bi-dash"></i>
                                    </a>
                                    
                                    <!-- Añadir una unidad, cambiado el redirect para que no use el del controller y te lleve a /products7list -->
                                    <a th:href="@{/cart/add/{id}(id=${entry.key.id},redirect='/cart')}"
                                       class="btn btn-outline-secondary" title="Add one unit">
                                        <i class="bi bi-plus"></i>
                                    </a>
									
									<!--los anteriores son para cantidades del mismo product, es decir, +x o -x, este es para borrar la línea entera del tirón-->
									<a th:href="@{/cart/remove/{id}(id=${entry.key.id})}"
									   class="btn btn-outline-danger" title="Remove product line">
									    <i class="bi bi-trash"></i>
									</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="row mt-4">
                <div class="col-md-6">
                    <h4>Total: <strong th:text="${#numbers.formatDecimal(total, 1, 2)} + ' €'"></strong></h4>
                </div>
				
                <div class="col-md-6 text-end">
                    <a href="/products/list" class="btn btn-secondary me-2">Continue shopping</a>
                    <form th:action="@{/cart/checkout}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-success">Process Order</button>
                    </form>
					
					<!--este es el "tercer nivel" de borrado, es decir, el primero es a nivel de cantidad, el segundo es a nivel de línea de pedido y este es a nivel global, es decir, de todo el carrito-->
					<a th:href="@{/cart/clear}" class="btn btn-danger">
						<i class="bi bi-trash3"></i>Clear cart
					</a>
					
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/user-modal :: userModal}"></div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
