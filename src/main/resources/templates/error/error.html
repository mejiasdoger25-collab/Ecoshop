<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
			xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<!--HEAD CON FRAGMENT, para evitar repetir los mismos enlaces en todos los templates-->
<head th:replace="~{fragments/head :: head}"></head>

<body class="bg-light">

	<div class="container mt-5" style="max-width: 600px;">
	    <div class="card border-danger shadow">
	        <div class="card-header bg-danger text-white d-flex align-items-center">
	            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-exclamation-triangle-fill me-2" viewBox="0 0 16 16">
	                <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
	            </svg>
	            <h4 class="mb-0" th:text="${errorTitulo}">Título del Error</h4>
	        </div>
	        <div class="card-body text-center">
	            <p class="fs-5 my-3" th:text="${errorMensaje}">Detalle explícito del problema ocurrido.</p>
	            <hr>
	            <p class="text-muted small">Código de Control Escolar Interno - Salesianos DAM</p>
	            <a th:href="@{/}" class="btn btn-outline-danger mt-2">Volver al Inicio</a>
	        </div>
	    </div>
	</div>
	
	<div th:replace="~{fragments/footer :: footer}"></div>

</body>
