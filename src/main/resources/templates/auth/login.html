<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
				xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<!--HEAD CON FRAGMENT, para evitar repetir los mismos enlaces en todos los templates-->
<head th:replace="~{fragments/head :: head}"></head>


<body class="bg-light">

<div class="container min-vh-100 d-flex justify-content-center align-items-center">

    <div class="col-md-5 col-lg-4">

        <div class="card shadow border-0 rounded-4">

            <div class="card-body p-4">

                <div class="text-center mb-4">
                    <i class="bi bi-leaf-fill text-success fs-1"></i>
                    <h2 class="fw-bold mt-2">EcoShop</h2>
                    <p class="text-muted mb-0"> Welcome!</p>
                </div>

                <!-- login error -->
                <div th:if="${param.error}" class="alert alert-danger text-center">Invalid username or password</div>
                <!-- logout -->
                <div th:if="${param.logout}" class="alert alert-success text-center"> Session closed correctly</div>

                <form method="post" th:action="@{/login}">

                    <div class="mb-3">
                        <label class="form-label"> Username </label>

                        <div class="input-group">
                            <span class="input-group-text"> <i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Password</label>

                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                    </div>

                    <button class="btn btn-success w-100 rounded-3">
                        <i class="bi bi-box-arrow-in-right"></i>Login
                    </button>

                </form>

                <hr>
                <small class="text-muted d-block text-center"> Demo users: admin/admin · user/1234 · vip/1234 </small>

            </div>

        </div>

    </div>

</div>

</body>
</html>
