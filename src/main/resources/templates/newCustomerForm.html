<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<title>EcoShop Login</title>

	    <!--Bootstrap&Js-->
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	</head>

	<body>

		<form method="POST" action="#" th:action="@{/newCustomer/submit}" th:object="${product}">
			<input type="text" name="name" th:field="*{name}" placeholder="Nombre..." />
			<input type="text" name="price" th:field="*{price}" placeholder="Precio..." />
			<input type="email" name="stock" th:field="*{stock}" placeholder="Stock..." />
			<input type="date" name="minimumStock" th:field="*{minimumStock}" placeholder="Minimum stock..."/>
			<input type="email" name="origin" th:field="*{origin}" placeholder="Origin..." />
			<input type="email" name="ecoCertificate" th:field="*{ecoCertificate}" placeholder="Eco certificate..." />
			<input type="email" name="description" th:field="*{description}" placeholder="Description..." />
			<input type="email" name="expirationDate" th:field="*{expirationDate}" placeholder="Expiration date..." />

			<input type="submit" name="enviar" value="Enviar" />

			</form>

		</body>

		</html>
