<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">


<!--HEAD CON FRAGMENT, para evitar repetir los mismos enlaces en todos los templates-->
<div th:replace="~{fragments/head :: head}"></div>


<body class="d-flex flex-column min-vh-100"><!--falta ipmlementar todos los estilos-->

	<div th:replace="~{fragments/navbar :: navbar}"></div>
	
	<div class="container mt-5">

	    <h1>Customer Form</h1>
	    <form th:action="@{/customers/new/submit}" th:object="${customer}" method="post">

	        <input type="hidden" th:field="*{id}">

			
	        <div class="mb-3">
	            <label>Name</label>
	            <input type="text" th:field="*{name}" class="form-control">
	        </div>

			
	        <div class="mb-3">
	            <label>Email</label>
	            <input type="email" th:field="*{email}" class="form-control">
	        </div>

			
	        <div class="mb-3">
	            <label>Phone</label>
	            <input type="text" th:field="*{phone}" class="form-control">
	        </div>

	        <button type="submit"name="submit" value="submit" class="btn btn-success">Save</button>
	        <a th:href="@{/customers/list}" class="btn btn-secondary">Cancel</a>
	    </form>

	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>
	
	</body>
	</html>
