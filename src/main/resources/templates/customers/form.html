<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
			xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<!--HEAD CON FRAGMENT, para evitar repetir los mismos enlaces en todos los templates-->
<head th:replace="~{fragments/head :: head}"></head>


<body class="d-flex flex-column min-vh-100"><!--falta ipmlementar todos los estilos-->

	<div th:replace="~{fragments/navbar :: navbar}"></div>
	
	<div class="container mt-5">

	    <h1>Customer Form</h1>
	    <form th:action="@{/customers/new/submit}" th:object="${customer}" method="post" class="needs-validation" novalidate>

	        <input type="hidden" th:field="*{id}">

	        <div class="mb-3">
	            <label>Name</label>
	            <input type="text" th:field="*{name}" class="form-control" maxlength="30" required>
	        </div>
			<div th:if="${param.error}" class="invalid-feedback">Please enter a valid username</div>

			
	        <div class="mb-3">
	            <label>Email</label>
	            <input type="email" th:field="*{email}" class="form-control" maxlength="320" required>
	        </div>
			<div th:if="${param.error}" class="invalid-feedback">Please enter a valid email</div>

			
	        <div class="mb-3">
	            <label>Phone</label>
	            <input type="text" th:field="*{phone}" class="form-control" maxlength="15">
	        </div>
			<div th:if="${param.error}" class="invalid-feedback">Please enter a valid phone number</div>
			
			
	        <button type="submit"name="submit" value="submit" class="btn btn-success">Save</button>
	        <a th:href="@{/customers/list}" class="btn btn-secondary">Cancel</a>
	    </form>

	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>
	
	</body>
	</html>
