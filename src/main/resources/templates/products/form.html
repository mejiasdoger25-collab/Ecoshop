<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
			xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<!--HEAD CON FRAGMENT, para evitar repetir los mismos enlaces en todos los templates-->
<head th:replace="~{fragments/head :: head}"></head>


<body class="d-flex flex-column min-vh-100"><!--falta ipmlementar todos los estilos-->

	<div th:replace="~{fragments/navbar :: navbar}"></div>
	
	<div class="container mt-5">

			    <h1>Product form</h1>

			    <form th:action="@{/products/new/submit}" th:object="${product}" method="post" class="needs-validation" novalidate>
					
			        <input type="hidden" th:field="*{id}"><!--type="hidden", lo enseño porque es para testing-->

			        <div class="mb-3">
			            <label>Name</label>
			            <input type="text" th:field="*{name}" class="form-control" maxlength="15" required>
			        </div>

			        <div class="mb-3">
			            <label>Price</label>
			            <input type="number" step="0.01" th:field="*{price}" class="form-control" maxlength="4" min="0" max="4" required>
			        </div>

			        <div class="mb-3">
			            <label>Stock</label>
			            <input type="number" th:field="*{stock}" class="form-control" maxlength="6" min="0" max="4" required>
			        </div>

			        <div class="mb-3">
			            <label>Origin</label>
			            <input type="text" th:field="*{origin}" class="form-control" maxlength="30" required>
			        </div>
					
					<div class="mb-3">
						<label>Description</label>
						<textarea type="text" th:field="*{description}" class="form-control" maxlength="100"></textarea>
					</div>

			        <div class="form-check mb-3">
			            <input type="checkbox" th:field="*{ecoCertificate}" class="form-check-input">
			            <label class="form-check-label">Ecologic certificate</label>
			        </div>

			        <button type="submit" name="submit" value="submit" class="btn btn-success">Save</button>
			        <a th:href="@{/products/list}" class="btn btn-secondary">Cancel</a>

			    </form>

			</div>
			
			<div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
