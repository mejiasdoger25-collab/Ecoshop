<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Products list</title>

    <!--Bootstrap&Js-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body><!--falta ipmlementar todos los estilos-->

	<div th:replace="~{fragments/navbar :: navbar}"></div>
	
	<div class="container mt-5">

			    <h1>Product form</h1>

			    <form th:action="@{/products/new/submit}" th:object="${product}" method="post">
					
			        <input type="hidden" th:field="*{id}"><!--type="hidden", lo enseño porque es para testing-->

			        <div class="mb-3">
			            <label>Name</label>
			            <input type="text" th:field="*{name}" class="form-control">
			        </div>

			        <div class="mb-3">
			            <label>Price</label>
			            <input type="number" step="0.01" th:field="*{price}" class="form-control">
			        </div>

			        <div class="mb-3">
			            <label>Stock</label>
			            <input type="number" th:field="*{stock}" class="form-control">
			        </div>

			        <div class="mb-3">
			            <label>Origin</label>
			            <input type="text" th:field="*{origin}" class="form-control">
			        </div>
					
					<div class="mb-3">
						<label>Description</label>
						<input type="text" th:field="*{description}" class="form-control">
					</div>

			        <div class="form-check mb-3">
			            <input type="checkbox" th:field="*{ecoCertificate}" class="form-check-input">
			            <label class="form-check-label">Ecologic certificate</label>
			        </div>

			        <button type="submit" name="submit" value="submit" class="btn btn-success">Save</button>
			        <a th:href="@{/products/list}" class="btn btn-secondary">Cancel</a>

			    </form>

			</div>
			
			<div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
