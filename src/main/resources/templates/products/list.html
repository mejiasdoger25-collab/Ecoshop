<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
			xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<!--HEAD CON FRAGMENT, para evitar repetir los mismos enlaces en todos los templates-->
<head th:replace="~{fragments/head :: head}"></head>


<body class="d-flex flex-column min-vh-100"><!--falta ipmlementar todos los estilos-->

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <!--header-->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <!--<h1>Products</h1>-->
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/new}" class="btn btn-success">New product</a>
    </div>

	<!--main layout-->
	<div class="row">

	    <!--SIDEBAR-->
	    <div class="col-md-3 mb-4">

	        <div
	            th:replace="~{fragments/sidebar :: sidebar}">
	        </div>

	    </div>

	    <!--PRODUCT GRID-->
	    <div class="col-md-9">

	        <div class="row g-4">

	            <div class="col-12 col-md-6 col-lg-4"
	                 th:each="product : ${products.content}">

	                <div class="card product-card h-100 shadow-sm border-0">

	                    <!--image-->
	                    <a th:href="@{/products/details/{id}(id=${product.id})}">
	                        <img th:src="${product.image != null ? product.image : 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/No-Image-Placeholder.svg/1920px-No-Image-Placeholder.svg.png'}"
	                            class="card-img-top card-image" alt="Product image">
	                    </a>

	                    <div class="card-body d-flex flex-column">

	                        <!--name-->
	                        <h5 class="card-title fw-bold"
	                            th:text="${product.name}">
	                        </h5>

	                        <!--origin-->
	                        <p class="text-muted mb-2">
	                            <i class="bi bi-geo-alt"></i>
	                            <span th:text="${product.origin}"></span>
	                        </p>

	                        <!--price-->
	                        <h4 class="text-success fw-bold mb-3">
	                            <span th:text="${#numbers.formatDecimal(product.price,1,2)}"></span>€
	                        </h4>

	                        <!--stock + eco-->
	                        <div class="mb-2">

	                            <span class="badge bg-primary">Stock:
	                                <span th:text="${product.stock}"></span>
	                            </span>

	                            <span th:if="${product.ecoCertificate}"
	                                class="badge bg-success"> Eco certified
	                            </span>

	                            <span th:unless="${product.ecoCertificate}"
	                                class="badge bg-secondary">Standard
	                            </span>

	                        </div>

	                        <!--description-->
	                        <p class="card-text text-muted flex-grow-1"
	                           th:text="${#strings.abbreviate(product.description,55)}">
	                        </p>

	                        <!--actions-->
	                        <div class="d-flex gap-2 mt-auto">

	                            <a th:href="@{/products/details/{id}(id=${product.id})}"
	                                class="btn btn-secondary btn-sm">Details
	                            </a>

	                            <a th:href="@{/cart/add/{id}(id=${product.id})}"
	                                class="btn btn-success flex-fill">
	                                <i class="bi bi-cart-plus"></i> Add
	                            </a>

	                            <span sec:authorize="hasRole('ADMIN')">

	                                <a th:href="@{/products/edit/{id}(id=${product.id})}"
	                                    class="btn btn-warning btn-sm"> Edit
	                                </a>

	                                <a th:href="@{/products/delete/{id}(id=${product.id})}"
	                                    class="btn btn-danger btn-sm delete-btn"
	                                    data-confirm="Delete product?">Delete
	                                </a>

	                            </span>

	                        </div>

	                    </div>

	                </div>

	            </div>

	        </div>

	    </div>

	</div>
	
	
	
	
	
	
	<div class="d-flex justify-content-center mt-4">

		<!-- previous -->
		<a th:if="${products.hasPrevious()}" th:href="@{/products/list(page=${products.number-1},size=${products.size})}"
			class="btn btn-outline-success me-2">Previous
		</a>

		<!-- page info -->
		<span class="align-self-center">Page
			<span th:text="${products.number + 1}"></span>of
			<span th:text="${products.totalPages}"></span>
		</span>

		<!-- next -->
		<a th:if="${products.hasNext()}" th:href="@{/products/list(page=${products.number+1},size=${products.size})}"
			class="btn btn-outline-success ms-2">Next
		</a>

	</div>

</div>

<div th:replace="~{fragments/user-modal :: userModal}"></div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
