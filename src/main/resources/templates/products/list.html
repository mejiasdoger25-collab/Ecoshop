<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
			xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<!--HEAD CON FRAGMENT, para evitar repetir los mismos enlaces en todos los templates-->
<head th:replace="~{fragments/head :: head}"></head>


<body class="d-flex flex-column min-vh-100"><!--falta ipmlementar todos los estilos-->

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <!--header-->
    <div class="d-flex justify-content-end align-items-center mb-4">
        <!--<h1>Products</h1>-->
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/new}" class="btn btn-success">Nuevo producto</a>
    </div>

	<!--main layout-->
	<div class="row">

	    <!--SIDEBAR-->
	    <div class="col-lg-2 col-md-3 mb-4 sidebar-sticky">

	        <div
	            th:replace="~{fragments/sidebar :: sidebar}">
	        </div>

	    </div>

	    <!--PRODUCT GRID-->
	    <div class="col-lg-10 col-md-9">

	        <div class="row g-4">

	            <div class="col-6 col-sm-6 col-md-6 col-lg-4 col-xl-3"
	                 th:each="product : ${products.content}">

	                <div class="card product-card h-100 shadow border-0 position-relative">

	                    <!--image, antes hecho != null, pero si ponías mal url =! null -> bien -> no cargaba. ahora detecta el error y si es así, carga default wiki img-->
						<a th:href="@{/products/details/{id}(id=${product.id})}" class="stretched-link">
							<img th:src="${product.image}" class="card-img-top card-image" alt="Product image"
							     onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/No-Image-Placeholder.svg/1920px-No-Image-Placeholder.svg.png';">
						</a>
							 
	                    <div class="card-body d-flex flex-column">

	                        <!--name-->
	                        <h5 class="card-title fw-bold"
	                            th:text="${product.name}">
	                        </h5>

	                        <!--price-->
							<div class="mb-3">

							    <!-- Producto ecológico -->
							    <div th:if="${product.ecoCertificate}">

							        <span class="text-decoration-line-through text-muted me-2">
							            <span th:text="${#numbers.formatDecimal(product.price,1,2)}"></span>€
							        </span>

							        <span class="fw-bold mb-3 price-c fs-5">
							            <span th:text="${#numbers.formatDecimal(productService.getEffectivePrice(product),1,2)}"></span>€
							        </span>

							    </div>

							    <!-- Producto normal -->
							    <div th:unless="${product.ecoCertificate}">
							        <span class="fw-bold fs-5 price-c">
							            <span th:text="${#numbers.formatDecimal(product.price,1,2)}"></span>€
							        </span>
							    </div>

							</div>

	                        <!--stock + eco-->
	                        <div class="mb-2">

								<span th:unless="${product.stock < product.minimumStock}"
								      class="badge bg-primary bg-opacity-25 text-primary fw-semibold">
								    Stock: <span th:text="${product.stock}"></span>
								</span>

								<span th:if="${product.stock < product.minimumStock}"
								      class="badge bg-warning text-dark">
								    Stock bajo
								</span>

	                            <span th:if="${product.ecoCertificate}"
	                                class="badge bg-success bg-opacity-25 text-success fw-semibold"> 🌱 Eco -10%
	                            </span>

	                            <span th:unless="${product.ecoCertificate}"
	                                class="badge bg-danger bg-opacity-25 text-danger fw-semibold"> No eco
	                            </span>
								
								<span th:if="${product.id == productService.getProductOfTheDay().id}"
								      class="badge bg-warning text-dark fw-bold">
								    🗓️ Oferta del día
								</span>

	                        </div>

	                        <!--description-->
	                        <p class="card-text text-muted flex-grow-1"
	                           th:text="${#strings.abbreviate(product.description,48)}">
	                        </p>

	                        <!--actions-->
	                        <div class="mt-auto card-actions">

								<div class="d-flex gap-2 mb-2">

								    <a th:href="@{/cart/add/{id}(id=${product.id})}"
								        class="btn btn-success flex-fill">
								        <i class="bi bi-cart-plus"></i> Añadir
								    </a>

								    <a th:href="@{/products/details/{id}(id=${product.id})}"
								    	class="btn btn-outline-secondary btn-sm d-flex align-items-center justify-content-center">
								        <i class="bi bi-eye me-1"></i>Detalles
								    </a>

								</div>

								<div sec:authorize="hasRole('ADMIN')" class="d-flex gap-2">

								    <a th:href="@{/products/edit/{id}(id=${product.id})}"
								       class="btn btn-warning btn-sm flex-fill">
								        Editar
								    </a>

								    <a th:href="@{/products/delete/{id}(id=${product.id})}"
								       class="btn btn-danger btn-sm flex-fill delete-btn"
								       data-confirm="¿Borrar producto?">
								        Borrar
								    </a>

								</div>

	                        </div>

	                    </div>

	                </div>

	            </div>

	        </div>

	    </div>

	</div>
	
	
	
	
	
	
	<div class="d-flex justify-content-center mt-4 mb-5">

		<!-- previous -->
		<a th:if="${products.hasPrevious()}" th:href="@{/products/list(page=${products.number-1},size=${products.size})}"
			class="btn btn-outline-success me-2">Previa
		</a>

		<!-- page info -->
		<span class="align-self-center">Página
			<span th:text="${products.number + 1}"></span>de
			<span th:text="${products.totalPages}"></span>
		</span>

		<!-- next -->
		<a th:if="${products.hasNext()}" th:href="@{/products/list(page=${products.number+1},size=${products.size})}"
			class="btn btn-outline-success ms-2">Siguiente
		</a>

	</div>

</div>

<div th:replace="~{fragments/user-modal :: userModal}"></div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
