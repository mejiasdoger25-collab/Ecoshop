<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Products list</title>

    <!--Bootstrap&Js-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body><!--falta ipmlementar todos los estilos-->

    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>List of products</h1>
            <a th:href="@{/products/new}" class="btn btn-success">New product </a>
        </div>


        <table class="table table-bordered table-hover">

            <thead class="table-dark">
				<tr>
					<th>ID</th>
				    <th>Name</th>
				    <th>Price</th>
				    <th>Stock</th>
				    <th>Origin</th>
				    <th>Description</th>
				    <th>EcoCertificate</th>
				    <th>Actions</th>
				</tr>
            </thead>

            <tbody>

                <tr th:each="product : ${products}">

                    <td th:text="${product.id}"></td>
                    <td th:text="${product.name}"></td>
					<td th:text="${product.price}"></td>
					<td th:text="${product.stock}"></td>
                    <td th:text="${product.origin}"></td>
                    <td th:text="${product.description}"></td>
                    <td>
                        <span th:if="${product.ecoCertificate}" class="badge bg-success">Yes</span>
                        <span th:unless="${product.ecoCertificate}" class="badge bg-danger">No</span>
                    </td>

                    <!--para el futuro edit button de la siguiente feature-->
                    <td>
                        <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">Edit</a>
                        <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm delete-btn" data-confirm="¿Delete product?">Delete</a><!--con js porque Rafa no quiere onclick ;V-->
                    </td>

                </tr>

            </tbody>

        </table>


    </div>

</body>

</html>
