<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head}"></head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-dark text-white">
            <h2 class="mb-0" th:text="${product.name}"> Product details</h2>
        </div>

        <div class="card-body">

            <div class="row mb-3">
                <div class="col-md-6">
                    <strong>ID:</strong>
                    <span th:text="${product.id}"></span>
                </div>

                <div class="col-md-6">
                    <strong>Origin:</strong>
                    <span th:text="${product.origin}"></span>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <strong>Price:</strong>
                    <span th:text="${product.price}"></span>€
                </div>

                <div class="col-md-6">
                    <strong>Stock:</strong>
                    <span th:text="${product.stock}"></span>
                </div>
            </div>

            <div class="mb-3">
                <strong>EcoCertificate:</strong>
                <span th:if="${product.ecoCertificate}" class="badge bg-success">Yes</span>
                <span th:unless="${product.ecoCertificate}" class="badge bg-danger"> No </span>
            </div>

            <div class="mb-4">
                <strong>Description:</strong>
                <div class="border rounded p-3 mt-2 bg-light">
                    <span th:text="${product.description}"></span>
                </div>

            </div>
			
            <div class="d-flex gap-2">
                <a th:href="@{/products/list}" class="btn btn-secondary"> Back </a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning"> Edit </a>
            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/user-modal :: userModal}"></div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
