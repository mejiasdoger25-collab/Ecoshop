<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head}"></head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-secondary text-white">
            <h2 class="mb-0" th:text="${product.name}"> Detalles del producto</h2>
        </div>

        <div class="card-body">
			
			<div class="row">
			
				<!--columna izquierda foto-->
				<div class="col-lg-6 text-center mb-4 mb-lg-0">
					<img  th:src="${product.image}" th:alt="${product.name}" class="img-fluid rounded shadow-sm img-detail" 
					onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/No-Image-Placeholder.svg/1920px-No-Image-Placeholder.svg.png';">
				</div>
				           
				<!--columna derecha datos-->
				<div class="col-lg-6">
		
					<div class="row mb-3">

					    <div class="col-md-6">
					        <strong>Origen:</strong>
					        <span th:text="${product.origin}"></span>
					    </div>

					    <div class="col-md-6">
					        <strong>Certificado ecológico:</strong>

					        <span th:if="${product.ecoCertificate}" class="badge bg-success">
					            Sí
					        </span>

					        <span th:unless="${product.ecoCertificate}" class="badge bg-danger">
					            No
					        </span>
					    </div>

					</div>
		
		            <div class="row mb-3">
		                <div class="col-md-6">
		                    <strong>Precio:</strong>
		                    <span th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></span>€
		                </div>
		
		                <div class="col-md-6">
		                    <strong>Stock:</strong>
		                    <span th:text="${product.stock}"></span>
		                </div>
		            </div>
		
		            
		
		            <div class="mb-4">
		                <strong>Descripción:</strong>
		                <div class="border rounded p-3 mt-2 bg-light">
		                    <span th:text="${product.description}"></span>
		                </div>
						
						<!--botón carrito add product-->
						<a th:href="@{/cart/add/{id}(id=${product.id})}" class="btn btn-success btn-lg me-3 mt-4">
						 	<i class="bi bi-cart-plus-fill"></i>Añadir al carrito
						</a>
		
		            </div>
					
		            <div class="d-flex gap-2">
		                <a th:href="@{/products/list}" class="btn btn-secondary"> Volver </a>
		                <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning"> Editar </a>
						<a sec:authorize="hasRole('ADMIN')" th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger"> Borrar </a>
		            </div>
					
				</div>	

			</div>
				
        </div>

    </div>

</div>

<div th:replace="~{fragments/user-modal :: userModal}"></div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
