<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
			xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<!--HEAD CON FRAGMENT, para evitar repetir los mismos enlaces en todos los templates-->
<div th:replace="~{fragments/head :: head}"></div>


<body><!--falta ipmlementar todos los estilos-->

	<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm sticky-top py-3">
	    <div class="container">

	        <!--Llogo-->
	        <a class="navbar-brand fw-bold fs-4 d-flex align-items-center" th:href="@{/products/list}">
	            <i class="bi bi-leaf-fill me-2 fs-3"></i>
	            <span>EcoShop</span>
	        </a>

	        <!--mobile toggle-->
	        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
	            <span class="navbar-toggler-icon"></span>
	        </button>

	        <!--navbar content -->
	        <div class="collapse navbar-collapse" id="navbarContent">

	            <!--left menu-->
	            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
	                <li class="nav-item">
	                    <a class="nav-link px-3" th:href="@{/products/list}"><i class="bi bi-box-seam me-1"></i>Products</a>
	                </li>

	                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
	                    <a class="nav-link px-3" th:href="@{/customers/list}"><i class="bi bi-people me-1"></i>Customers</a>
	                </li>

	                <li class="nav-item">
	                    <a class="nav-link px-3" th:href="@{/orders/list}"><i class="bi bi-bag me-1"></i>Orders</a>
	                </li>
					
					<li class="nav-item d-flex align-items-center">
					    <a class="btn btn-secondary btn-sm d-flex align-items-center gap-1 px-3" th:href="@{/cart}"><i class="bi bi-cart3 me-1"></i> Cart
					        <span class="badge bg-light text-success ms-1" th:text="${cartCount}" th:if="${cartCount > 0}"></span>
					    </a>
					</li>
	            </ul>

	            <!--right side -->
	            <div class="d-flex align-items-center gap-2">

	                <!--new Dropdown -->
	                <div class="dropdown" sec:authorize="hasRole('ADMIN')">

	                    <button class="btn btn-light btn-sm dropdown-toggle d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
	                        <i class="bi bi-plus-circle"></i>
	                        <span class="fw-medium">New</span>
	                    </button>

	                    <ul class="dropdown-menu dropdown-menu-end shadow">
	                        <li sec:authorize="hasRole('ADMIN')">
	                            <a class="dropdown-item" th:href="@{/products/new}"><i class="bi bi-box-seam text-success me-2"></i>Product</a>
	                        </li>
	                        <li sec:authorize="hasRole('ADMIN')">
	                            <a class="dropdown-item" th:href="@{/customers/new}"><i class="bi bi-people text-success me-2"></i>Customer</a>
	                        </li>
	                        <li sec:authorize="hasAnyRole('USER','VIP','ADMIN')">
	                            <a class="dropdown-item" th:href="@{/orders/new}"><i class="bi bi-bag text-success me-2"></i>Order</a>
	                        </li>
	                    </ul>

	                </div>

	                <!--user section -->
	                <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">

	                    <!--user Dropdown -->
	                    <div class="dropdown">
							
	                        <button class="btn btn-light btn-sm dropdown-toggle d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
	                            <i class="bi bi-person-circle"></i>
	                            <span sec:authentication="name" class="fw-medium"></span>
	                        </button>
							
	                        <ul class="dropdown-menu dropdown-menu-end shadow">
	                            <li>
	                                <span class="dropdown-item-text text-muted small px-3 py-2">
	                                    Logged in as <strong sec:authentication="name"></strong>
	                                </span>
	                            </li>
	                            <li><hr class="dropdown-divider"></li>
	                            <li>
	                                <form th:action="@{/logout}" method="post">
	                                    <button type="submit" class="dropdown-item text-danger">
	                                        <i class="bi bi-box-arrow-right me-2"></i>Log out
	                                    </button>
	                                </form>
	                            </li>
	                        </ul>
							
	                    </div>

	                    <!--my account button --modal-- -->
	                    <button sec:authorize="isAuthenticated()" class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#userModal">
	                        <i class="bi bi-person"></i>
	                        <span class="ms-1 d-none d-md-inline">My Account</span>
	                    </button>
						
	                </div>

					<!-- login/register (no authenticated) -->
					<div sec:authorize="!isAuthenticated()" class="d-flex gap-2">

					    <a th:href="@{/login}" class="btn btn-outline-light btn-sm">
					        <i class="bi bi-box-arrow-in-right me-1"></i>Login
					    </a>

					    <a th:href="@{/register}" class="btn btn-light btn-sm">
					        <i class="bi bi-person-plus me-1"></i> Register
					    </a>

					</div>

	            </div>
	        </div>
	    </div>
	</nav>

</body>
</html>
