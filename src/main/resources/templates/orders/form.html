<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">


<!--HEAD CON FRAGMENT, para evitar repetir los mismos enlaces en todos los templates-->
<div th:replace="~{fragments/head :: head}"></div>


<body class="d-flex flex-column min-vh-100"><!--falta ipmlementar todos los estilos-->

	<div th:replace="~{fragments/navbar :: navbar}"></div>
	
	<div class="container mt-5">

	    <h1>Order Form</h1>
	    <form th:action="@{/orders/new/submit}" th:object="${order}" method="post">

	        <input type="hidden" th:field="*{id}">

			
	        <div class="mb-3">
	            <label>Code</label>
	            <input type="text" th:field="*{code}" class="form-control">
	        </div>

			
	        <div class="mb-3">
	            <label>Date</label>
	            <input type="date" th:field="*{shippingDate}" class="form-control">
	        </div>

			
	        <div class="mb-3">
	            <label>Total</label>
	            <input type="number" step="0.01" th:field="*{total}" class="form-control">
	        </div>

			
	        <div class="mb-3">
	            <label>Customer</label>
	            <select th:field="*{customer}" class="form-select">
	                <option value=""> Select customer</option>
	                <option th:each="customer : ${customers}" th:value="${customer.id}" th:text="${customer.name}"></option>
	            </select>
	        </div>

			
	        <button type="submit" class="btn btn-success">Save</button>
	        <a th:href="@{/orders/list}" class="btn btn-secondary">Cancel</a>

	    </form>
	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>
	
	</body>
	</html>
