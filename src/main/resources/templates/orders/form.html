<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Products list</title>

    <!--Bootstrap&Js-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body><!--falta ipmlementar todos los estilos-->

	<div th:replace="~{fragments/navbar :: navbar}"></div>
	
	<div class="container mt-5">

	    <h1>Order Form</h1>
	    <form th:action="@{/orders/new/submit}" th:object="${order}" method="post">

	        <input type="hidden" th:field="*{id}">

			
	        <div class="mb-3">
	            <label>Code</label>
	            <input type="text" th:field="*{code}" class="form-control">
	        </div>

			
	        <div class="mb-3">
	            <label>Date</label>
	            <input type="date" th:field="*{shippingDate}" class="form-control">
	        </div>

			
	        <div class="mb-3">
	            <label>Total</label>
	            <input type="number" step="0.01" th:field="*{total}" class="form-control">
	        </div>

			
	        <div class="mb-3">
	            <label>Customer</label>
	            <select th:field="*{customer}" class="form-select">
	                <option value=""> Select customer</option>
	                <option th:each="customer : ${customers}" th:value="${customer.id}" th:text="${customer.name}"></option>
	            </select>
	        </div>

			
	        <button type="submit" class="btn btn-success">Save</button>
	        <a th:href="@{/orders}" class="btn btn-secondary">Cancel</a>

	    </form>
	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>
	
	</body>
	</html>
