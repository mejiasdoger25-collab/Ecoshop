<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Products list</title>

    <!--Bootstrap&Js-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body><!--falta ipmlementar todos los estilos-->

	<div class="container mt-5">

	    <div class="d-flex justify-content-between mb-4">
	        <h1>Order List</h1>
	        <a th:href="@{/orders/new}" class="btn btn-success">New order</a>
	    </div>

	    <table class="table table-bordered">
	        <thead class="table-dark">
	        <tr>
	            <th>ID</th>
	            <th>Code</th>
	            <th>Date</th>
	            <th>Total</th>
	            <th>Customer</th>
	            <th>Actions</th>
	        </tr>
	        </thead>

			
	        <tbody>
	        <tr th:each="order : ${orders}">
	            <td th:text="${order.id}"></td>
	            <td th:text="${order.code}"></td>
	            <td th:text="${order.date}"></td>
	            <td th:text="${order.total}"></td>
	            <td th:text="${order.customer.name}"></td>
	            <td>
	                <a th:href="@{/orders/edit/{id}(id=${order.id})}" class="btn btn-warning btn-sm">Edit</a>
	                <a th:href="@{/orders/delete/{id}(id=${order.id})}" class="btn btn-danger btn-sm"> Delete</a>
	            </td>
	        </tr>
	        </tbody>

			
	    </table>

	</div>
